# Single Node Configuration Template
#
# Usage:
#   ./target/aikv --config config.toml

[server]
# Bind address
host = "0.0.0.0"

# Bind port
port = 6379


[storage]
# Storage engine type
# Options:
#   - "memory": In-memory storage, high performance, no persistence
#   - "aidb"  : AiDb LSM-Tree persistent storage
engine = "aidb"

# Data directory (required for aidb mode)
data_dir = "./data"

# Number of databases (0-15, total 16 databases)
databases = 16


[logging]
# Log level
# ptions: trace, debug, info, warn, error
# CONFIG SET loglevel <level>
level = "info"


[slowlog]
# Slow query threshold in microseconds
# CONFIG SET slowlog-log-slower-than <us> 
# Commands taking longer than this will be logged
log-slower-than = 10000

# Maximum slow log entries
# CONFIG SET slowlog-max-len <len>
max-len = 128


[tracing]
enabled = false
service_name = "aikv"
otlp_endpoint = "http://localhost:4317"
sampling_ratio = 1.0
