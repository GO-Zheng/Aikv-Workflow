server:
  http_listen_port: 9081
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

client:
  url: http://${MONITOR_HOST}:3100/loki/api/v1/push
  tenant_id: fake
  batchwait: 1s
  batchsize: 102400

scrape_configs:
  - job_name: aikv-docker-logs
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 10s
        filters:
          - name: label
            values: ["app=aikv"]
    pipeline_stages:
      - docker: {}
      - json:
          expressions:
            level: level
            msg: msg
            message: message
            node: node
            service_name: service
            request_id: request_id
            ts: ts
            diag_event: diag_event
      - timestamp:
          source: ts
          format: RFC3339Nano
          action_on_failure: skip
      - labels:
          level:
          node:
          service_name:
    relabel_configs:
      - replacement: "aikv"
        target_label: job
      - replacement: "json"
        target_label: log_format
      - replacement: "${SERVER_HOST}"
        target_label: cluster_host
      - source_labels: [__meta_docker_container_name]
        regex: "/?(.*)"
        target_label: service
      - action: labeldrop
        regex: "com_docker_compose_.*|org_opencontainers_.*|__meta_docker_.*"
