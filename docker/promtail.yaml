server:
  http_listen_port: 9081
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

client:
  url: http://${MONITOR_HOST}:3100/loki/api/v1/push
  tenant_id: fake
  batchwait: 1s
  batchsize: 102400

scrape_configs:
  - job_name: aikv-docker-logs
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 10s
        filters:
          - name: label
            values: ["app=aikv"]
    relabel_configs:
      - replacement: "aikv"
        target_label: job
      - replacement: "${SERVER_HOST}"
        target_label: cluster_host
      - source_labels: [__meta_docker_container_name]
        regex: "/?(.*)"
        target_label: service
      - action: labeldrop
        regex: "com_docker_compose_.*|org_opencontainers_.*|__meta_docker_.*"
