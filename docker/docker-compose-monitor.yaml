# AiKv monitor

name: aikv-monitor
services:
  grafana:
    image: grafana/grafana:12.4.1
    container_name: aikv-grafana
    user: "0:0"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    ports:
      - "3000:3000"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      # - ./data/grafana:/var/lib/grafana
    restart: unless-stopped
    networks:
      - aikv-workflow
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  prometheus:
    image: prom/prometheus:v3.9.1
    container_name: aikv-prometheus
    user: "0:0"
    command:
      - "--config.file=/etc/prometheus/prometheus.yaml"
      - "--storage.tsdb.path=/prometheus"
      # 存储保留策略
      - "--storage.tsdb.retention.time=15d"
      - "--storage.tsdb.retention.size=5GB"
      # 热加载: curl -X POST http://localhost:9090/-/reload
      - "--web.enable-lifecycle"
      - "--web.enable-remote-write-receiver"
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yaml:/etc/prometheus/prometheus.yaml:ro
      # - ./data/prometheus:/prometheus
    restart: unless-stopped
    networks:
      - aikv-workflow
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 5s
      retries: 3

  loki:
    image: grafana/loki:3.7
    container_name: aikv-loki
    user: "0:0"
    command:
      - "-config.file=/etc/loki/loki.yaml"
    ports:
      - "3100:3100"
    volumes:
      - ./loki.yaml:/etc/loki/loki.yaml:ro
      # - ./data/loki:/loki
    restart: unless-stopped
    networks:
      - aikv-workflow

