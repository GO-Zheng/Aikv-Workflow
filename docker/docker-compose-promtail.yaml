# 在 AiKv 集群机上运行, 与 docker-compose-monitor.yaml 配套运行

name: aikv-monitor
services:
  promtail:
    image: grafana/promtail:3.6.8
    container_name: aikv-promtail
    user: "0:0"
    command:
      - "-config.expand-env=true"
      - "-config.file=/etc/promtail/promtail.yaml"
    environment:
      - MONITOR_HOST=${MONITOR_HOST}
      - SERVER_HOST=${SERVER_HOST}
    ports:
      - "9081:9081"
    volumes:
      - ./promtail.yaml:/etc/promtail/promtail.yaml:ro
      # - ../logs:/var/log/aikv:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped
    networks:
      - aikv-workflow

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: aikv-cadvisor
    ports:
      - "8088:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /dev/disk:/dev/disk:ro
    privileged: true
    devices:
      - /dev/kmsg
    restart: unless-stopped
    networks:
      - aikv-workflow

networks:
  aikv-workflow:
    name: aikv-workflow
    driver: bridge