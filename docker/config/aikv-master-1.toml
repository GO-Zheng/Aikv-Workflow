# AiKv Master 1 - Bootstrap Node
# Redis: 容器 6379 -> 宿主机 6379; Raft: 容器 50051 -> 宿主机 50051

[server]
host = "0.0.0.0"
port = 6379

[cluster]
enabled = true
raft_address = "aikv-master-1:50051"
is_bootstrap = false
peers = []

[storage]
engine = "aidb"
data_dir = "/app/data"
databases = 16

[logging]
level = "debug"
