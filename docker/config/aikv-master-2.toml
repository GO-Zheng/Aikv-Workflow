# AiKv Master 2
# Redis: 容器 6379 -> 宿主机 6382; Raft: 容器 50051 -> 宿主机 50054

[server]
host = "0.0.0.0"
port = 6379

[cluster]
enabled = true
raft_address = "aikv-master-2:50051"
is_bootstrap = false
peers = []

[storage]
engine = "aidb"
data_dir = "/app/data"
databases = 16

[logging]
level = "debug"
