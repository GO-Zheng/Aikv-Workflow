# AiKv Replica 2a - Master 2 的副本

# Redis: 容器 6379 -> 宿主机 6383; Raft: 容器 50051 -> 宿主机 50055

[server]
host = "0.0.0.0"
port = 6379

[cluster]
enabled = true
raft_address = "aikv-replica-2a:50051"
is_bootstrap = false
peers = []

[storage]
engine = "aidb"
data_dir = "/app/data"
databases = 16

[logging]
level = "debug"
