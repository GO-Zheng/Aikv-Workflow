global:
  scrape_interval: 5s
  evaluation_interval: 5s
  scrape_timeout: 5s

scrape_configs:
  # Prometheus 自身
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # Node Exporter - 节点指标
  - job_name: "node-exporter"
    static_configs:
      - targets: ["node-exporter:9100"]

  # Redis Exporter - AiKv 指标
  - job_name: "aikv-exporter"
    static_configs:
      - targets: ["aikv-exporter:9121"]

  # AiDb Exporter - AiDb 层指标 (MemTable, WAL, BlockCache)
  - job_name: "aidb-exporter"
    static_configs:
      - targets: ["aidb-exporter:9120"]
