# AiKv Cluster Monitor

name: aikv-monitor
services:
  aikv-exporter-replica-1:
    image: oliver006/redis_exporter:v1.80.1
    container_name: aikv-exporter-replica-1
    environment:
      - REDIS_ADDR=redis://${SERVER_HOST}:6380
    ports:
      - "9221:9121"
    restart: unless-stopped
    networks:
      - aikv-workflow

  aidb-exporter-replica-1:
    image: aidb-exporter:v0.0.2
    container_name: aidb-exporter-replica-1
    environment:
      - AIDB_TARGET=redis://${SERVER_HOST}:6380
      - EXPORTER_PORT=9120
    ports:
      - "9220:9120"
    restart: unless-stopped
    networks:
      - aikv-workflow

  aikv-exporter-master-2:
    image: oliver006/redis_exporter:v1.80.1
