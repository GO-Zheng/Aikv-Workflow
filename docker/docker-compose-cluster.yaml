    healthcheck:
      test: ["CMD", "redis-cli", "-h", "localhost", "-p", "6379", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ============================================================
  # Master-2 — 分片 2 主
  # ============================================================
