# AiKv 集群模式
#    2 组分片: 每组 1 主 2 从, 共 6 节点; 每分片 Raft 3 副本, 可容忍 1 节点故障
#
# 节点规划:
#   Master-1:    6379, Raft 50051 (bootstrap)
#   Replica-1a:  6380, Raft 50052
#   Replica-1b:  6381, Raft 50053
#   Master-2:    6382, Raft 50054
#   Replica-2a:  6383, Raft 50055
#   Replica-2b:  6384, Raft 50056
#   -----------------------------
#   (扩容测试使用)
#   Master-3:    6385, Raft 50057
#   Replica-3a:  6386, Raft 50058
#   Replica-3b:  6387, Raft 50059
#
# 启动后需要运行初始化脚本:
#   docker compose -f docker-compose-cluster.yaml up -d
#   ./scripts/init_cluster.sh
#
# 镜像由环境变量 AIKV_CLUSTER_IMAGE 指定(默认 aikv:cluster).

name: aikv-cluster
services:
  aikv-master-1:
    image: &image ${AIKV_CLUSTER_IMAGE:-aikv:cluster}
    container_name: aikv-master-1
    hostname: aikv-master-1
    user: root
    command: ["--config", "/app/aikv-cluster.toml"]
    ports:
      - "6379:6379"   # Redis protocol
      - "50051:50051" # Raft gRPC
    volumes:
      - ./config/aikv-master-1.toml:/app/aikv-cluster.toml:ro
      # - ./data/aikv-cluster/master-1:/app/data
      # - ./logs/cluster:/app/logs
    environment:
      - RUST_LOG=debug
      - AIKV_ADVERTISE_HOST=${SERVER_HOST:-127.0.0.1}
      - AIKV_AUTO_FAILOVER=true
      - AIKV_AUTO_FAILOVER_REQUIRED_CHECKS=2
      - AIKV_AUTO_FAILOVER_MIN_OFFLINE_SECS=10
      - AIKV_AUTO_FAILOVER_COOLDOWN_SECS=30
    restart: unless-stopped
    labels:
      - app=aikv
      - node=master-1
    networks:
      aikv-workflow:
        aliases:
          - aikv  # 兼容单机模式 monitor
    healthcheck:
      test: ["CMD", "redis-cli", "-h", "localhost", "-p", "6379", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  aikv-exporter:
    image: oliver006/redis_exporter:v1.80.1
    container_name: aikv-exporter
    environment:
      - REDIS_ADDR=redis://aikv-master-1:6379
    ports:
      - "9121:9121"
    restart: unless-stopped
    networks:
      aikv-workflow:
        aliases:
          - aikv-exporter-master-1

  aidb-exporter:
    image: aidb-exporter:v0.0.2
    container_name: aidb-exporter
    environment:
      - AIDB_TARGET=redis://aikv-master-1:6379
      - EXPORTER_PORT=9120
    ports:
      - "9120:9120"
    restart: unless-stopped
    networks:
      aikv-workflow:
        aliases:
          - aidb-exporter-master-1

