# AiKv 集群模式 (3主3从)
#
# 节点规划:
#   Master-1:  6379, Raft 50051 (bootstrap)
#   Replica-1: 6380, Raft 50052
#   Master-2:  6381, Raft 50053
#   Replica-2: 6382, Raft 50054
#   Master-3:  6383, Raft 50055
#   Replica-3: 6384, Raft 50056
#
# 启动后需要运行初始化脚本:
#   docker compose -f docker-compose-cluster.yaml up -d
#   ./scripts/init_cluster.sh
#
# 镜像由环境变量 AIKV_CLUSTER_IMAGE 指定（默认 aikv:cluster），run_cluster.sh 启动前会导出。

services:
  # ============================================================
  # Master-1 (Bootstrap Node)
  # ============================================================
  aikv-master-1:
    image: ${AIKV_CLUSTER_IMAGE:-aikv:cluster}
    container_name: aikv-master-1
    hostname: aikv-master-1
    user: root
    command: ["--config", "/app/aikv-cluster.toml"]
    ports:
      - "6379:6379"   # Redis protocol
      - "50051:50051" # Raft gRPC
    volumes:
      # - ../data/aikv-cluster/master-1:/app/data
      # - ../logs/cluster:/app/logs
      - ../config/aikv-master-1.toml:/app/aikv-cluster.toml:ro
    environment:
      - RUST_LOG=debug
      - AIKV_ADVERTISE_HOST=${SERVER_HOST:-127.0.0.1}
      - AIKV_AUTO_FAILOVER=false
    restart: unless-stopped
    labels:
      - app=aikv
    networks:
      aikv-workflow:
        aliases:
          - aikv    # 兼容单机模式 monitor
    healthcheck:
      test: ["CMD", "redis-cli", "-h", "localhost", "-p", "6379", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ============================================================
  # Replica-1 (of Master-1)
  # ============================================================
  aikv-replica-1:
    image: ${AIKV_CLUSTER_IMAGE:-aikv:cluster}
    container_name: aikv-replica-1
    hostname: aikv-replica-1
    user: root
    command: ["--config", "/app/aikv-cluster.toml"]
    ports:
      - "6380:6379"
      - "50052:50051"
    volumes:
      # - ../data/aikv-cluster/replica-1:/app/data
      # - ../logs/cluster:/app/logs
      - ../config/aikv-replica-1.toml:/app/aikv-cluster.toml:ro
    environment:
      - RUST_LOG=debug
      - AIKV_ADVERTISE_HOST=${SERVER_HOST:-127.0.0.1}
      - AIKV_AUTO_FAILOVER=false
    restart: unless-stopped
    labels:
      - app=aikv
    networks:
      - aikv-workflow
    healthcheck:
      test: ["CMD", "redis-cli", "-h", "localhost", "-p", "6379", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ============================================================
  # Master-2
  # ============================================================
  aikv-master-2:
    image: ${AIKV_CLUSTER_IMAGE:-aikv:cluster}
    container_name: aikv-master-2
    hostname: aikv-master-2
    user: root
    command: ["--config", "/app/aikv-cluster.toml"]
    ports:
      - "6381:6379"
      - "50053:50051"
    volumes:
      # - ../data/aikv-cluster/master-2:/app/data
      # - ../logs/cluster:/app/logs
      - ../config/aikv-master-2.toml:/app/aikv-cluster.toml:ro
    environment:
      - RUST_LOG=debug
      - AIKV_ADVERTISE_HOST=${SERVER_HOST:-127.0.0.1}
      - AIKV_AUTO_FAILOVER=false
    restart: unless-stopped
    labels:
      - app=aikv
    networks:
      - aikv-workflow
    healthcheck:
      test: ["CMD", "redis-cli", "-h", "localhost", "-p", "6379", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ============================================================
  # Replica-2 (of Master-2)
  # ============================================================
  aikv-replica-2:
    image: ${AIKV_CLUSTER_IMAGE:-aikv:cluster}
    container_name: aikv-replica-2
    hostname: aikv-replica-2
    user: root
    command: ["--config", "/app/aikv-cluster.toml"]
    ports:
      - "6382:6379"
      - "50054:50051"
    volumes:
      # - ../data/aikv-cluster/replica-2:/app/data
      # - ../logs/cluster:/app/logs
      - ../config/aikv-replica-2.toml:/app/aikv-cluster.toml:ro
    environment:
      - RUST_LOG=debug
      - AIKV_ADVERTISE_HOST=${SERVER_HOST:-127.0.0.1}
      - AIKV_AUTO_FAILOVER=false
    restart: unless-stopped
    labels:
      - app=aikv
    networks:
      - aikv-workflow
    healthcheck:
      test: ["CMD", "redis-cli", "-h", "localhost", "-p", "6379", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ============================================================
  # Master-3
  # ============================================================
  aikv-master-3:
    image: ${AIKV_CLUSTER_IMAGE:-aikv:cluster}
    container_name: aikv-master-3
    hostname: aikv-master-3
    user: root
    command: ["--config", "/app/aikv-cluster.toml"]
    ports:
      - "6383:6379"
      - "50055:50051"
    volumes:
      # - ../data/aikv-cluster/master-3:/app/data
      # - ../logs/cluster:/app/logs
      - ../config/aikv-master-3.toml:/app/aikv-cluster.toml:ro
    environment:
      - RUST_LOG=debug
      - AIKV_ADVERTISE_HOST=${SERVER_HOST:-127.0.0.1}
      - AIKV_AUTO_FAILOVER=false
    restart: unless-stopped
    labels:
      - app=aikv
    networks:
      - aikv-workflow
    healthcheck:
      test: ["CMD", "redis-cli", "-h", "localhost", "-p", "6379", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ============================================================
  # Replica-3 (of Master-3)
  # ============================================================
  aikv-replica-3:
    image: ${AIKV_CLUSTER_IMAGE:-aikv:cluster}
    container_name: aikv-replica-3
    hostname: aikv-replica-3
    user: root
    command: ["--config", "/app/aikv-cluster.toml"]
    ports:
      - "6384:6379"
      - "50056:50051"
    volumes:
      # - ../data/aikv-cluster/replica-3:/app/data
      # - ../logs/cluster:/app/logs
      - ../config/aikv-replica-3.toml:/app/aikv-cluster.toml:ro
    environment:
      - RUST_LOG=debug
      - AIKV_ADVERTISE_HOST=${SERVER_HOST:-127.0.0.1}
      - AIKV_AUTO_FAILOVER=false
    restart: unless-stopped
    labels:
      - app=aikv
    networks:
