# AiKv 集群模式 (2 组分片：每组 1 主 2 从，共 6 节点；每分片 Raft 3 副本，可容忍 1 节点故障)
#
# 节点规划:
#   Master-1:    6379, Raft 50051 (bootstrap)
#   Replica-1a:  6380, Raft 50052
#   Replica-1b:  6381, Raft 50053
#   Master-2:    6382, Raft 50054
#   Replica-2a:  6383, Raft 50055
#   Replica-2b:  6384, Raft 50056
#
# 启动后需要运行初始化脚本:
#   docker compose -f docker-compose-cluster.yaml up -d
#   ./scripts/init_cluster.sh
#
# 镜像由环境变量 AIKV_CLUSTER_IMAGE 指定（默认 aikv:cluster），run_cluster.sh 启动前会导出。

services:
  # ============================================================
  # Master-1 (Bootstrap Node) — 分片 1 主
  # ============================================================
  aikv-master-1:
    image: ${AIKV_CLUSTER_IMAGE:-aikv:cluster}
    container_name: aikv-master-1
    hostname: aikv-master-1
    user: root
    command: ["--config", "/app/aikv-cluster.toml"]
    ports:
      - "6379:6379"   # Redis protocol
      - "50051:50051" # Raft gRPC
    volumes:
      # - ../data/aikv-cluster/master-1:/app/data
      # - ../logs/cluster:/app/logs
      - ../config/aikv-master-1.toml:/app/aikv-cluster.toml:ro
    environment:
      - RUST_LOG=debug
      - AIKV_ADVERTISE_HOST=${SERVER_HOST:-127.0.0.1}
      - AIKV_AUTO_FAILOVER=true
      - AIKV_AUTO_FAILOVER_REQUIRED_CHECKS=2
      - AIKV_AUTO_FAILOVER_MIN_OFFLINE_SECS=10
      - AIKV_AUTO_FAILOVER_COOLDOWN_SECS=30
    restart: unless-stopped
    labels:
      - app=aikv
    networks:
      aikv-workflow:
        aliases:
          - aikv    # 兼容单机模式 monitor
    healthcheck:
      test: ["CMD", "redis-cli", "-h", "localhost", "-p", "6379", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ============================================================
  # Replica-1a (of Master-1)
  # ============================================================
  aikv-replica-1a:
    image: ${AIKV_CLUSTER_IMAGE:-aikv:cluster}
    container_name: aikv-replica-1a
    hostname: aikv-replica-1a
    user: root
    command: ["--config", "/app/aikv-cluster.toml"]
    ports:
      - "6380:6379"
      - "50052:50051"
    volumes:
      # - ../data/aikv-cluster/replica-1a:/app/data
      # - ../logs/cluster:/app/logs
      - ../config/aikv-replica-1a.toml:/app/aikv-cluster.toml:ro
    environment:
      - RUST_LOG=debug
      - AIKV_ADVERTISE_HOST=${SERVER_HOST:-127.0.0.1}
      - AIKV_AUTO_FAILOVER=true
      - AIKV_AUTO_FAILOVER_REQUIRED_CHECKS=2
      - AIKV_AUTO_FAILOVER_MIN_OFFLINE_SECS=10
      - AIKV_AUTO_FAILOVER_COOLDOWN_SECS=30
    restart: unless-stopped
    labels:
      - app=aikv
    networks:
      - aikv-workflow
    healthcheck:
      test: ["CMD", "redis-cli", "-h", "localhost", "-p", "6379", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ============================================================
  # Replica-1b (of Master-1)
  # ============================================================
  aikv-replica-1b:
    image: ${AIKV_CLUSTER_IMAGE:-aikv:cluster}
    container_name: aikv-replica-1b
    hostname: aikv-replica-1b
    user: root
